<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InAmigos Foundation — Welcome</title>
  <meta name="description" content="Every Pin Tells a Story of Impact. Enter to explore InAmigos Foundation's journey across India.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/entry.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="page-entry">
  <div class="entry-overlay-fade" aria-hidden="true"></div>

  <main class="entry-screen" id="entry">
    <div class="entry-screen__media" aria-hidden="true">
      <img
        src="assets/images/hero/hands-together.jpg"
        alt=""
        width="1920"
        height="1080"
        fetchpriority="high"
        loading="eager"
        onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&amp;fit=crop&amp;w=1920&amp;q=85';"
      >
    </div>
    <div class="entry-screen__overlay" aria-hidden="true"></div>

    <div class="entry-content">
      <img
        class="entry-logo"
        src="assets/logos/inamigos-logo.svg"
        alt="InAmigos Foundation logo"
        width="120"
        height="120"
        onerror="this.style.display='none'"
      >

      <h1 class="entry-title">InAmigos Foundation</h1>
      <p class="entry-tagline">Every Pin Tells a Story of Impact</p>
      <p class="entry-intro">
        Explore our journey across India and discover how communities are being transformed through education, empowerment, sustainability, and service.
      </p>

      <div class="entry-stats" data-entry-counters>
        <div class="entry-stat">
          <div class="entry-stat__value" data-count="50000" data-suffix="+">0</div>
          <div class="entry-stat__label">Lives Impacted</div>
        </div>
        <div class="entry-stat">
          <div class="entry-stat__value" data-count="200" data-suffix="+">0</div>
          <div class="entry-stat__label">Volunteers</div>
        </div>
        <div class="entry-stat">
          <div class="entry-stat__value" data-count="28" data-suffix="">0</div>
          <div class="entry-stat__label">States Reached</div>
        </div>
        <div class="entry-stat">
          <div class="entry-stat__value" data-count="20000" data-suffix="+">0</div>
          <div class="entry-stat__label">Trees Planted</div>
        </div>
      </div>

      <div class="entry-actions">
        <button type="button" class="btn-enter" id="btn-enter" data-href="home.html" aria-label="Enter the InAmigos Foundation website">
          <span>Enter</span>
          <span class="arrow" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </main>

  <script src="js/counters.js" defer></script>
  <script src="js/animations.js" defer></script>
  <script src="js/entry.js" defer></script>
</body>
</html>
